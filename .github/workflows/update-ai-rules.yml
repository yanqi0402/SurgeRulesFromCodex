name: Update AI Rules

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * *"

permissions:
  contents: write

jobs:
  update-ai-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate AI.list
        run: python3 scripts/update_ai_rules.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No rule changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add AI.list scripts/update_ai_rules.py README.md .github/workflows/update-ai-rules.yml
          git commit -m "chore: update AI rules"
          git push
